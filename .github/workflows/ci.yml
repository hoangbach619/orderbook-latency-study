name: ci

on:
  push:
  pull_request:

# The latency benchmark is never run here. Shared CI runners scale frequency, share
# cores with neighbours, and deny performance counter access, so any number measured on
# them would be noise. The benchmark is built to prove it compiles, then run by hand on a
# controlled machine as described in docs/methodology.md.

jobs:
  build-and-test:
    name: build and test (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-18
            cxx: clang++-18
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitisers:
    name: sanitisers (${{ matrix.sanitiser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitiser: [asan-ubsan, tsan]
    env:
      CC: clang-18
      CXX: clang++-18
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DOBLS_SANITIZER=${{ matrix.sanitiser }}
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  format-and-tidy:
    name: clang-format and clang-tidy
    runs-on: ubuntu-latest
    env:
      CC: clang-18
      CXX: clang++-18
    steps:
      - uses: actions/checkout@v4
      - name: Install tooling
        run: sudo apt-get update && sudo apt-get install -y clang-format-18 clang-tidy-18
      - name: clang-format check
        run: |
          find include bench tests \( -name '*.hpp' -o -name '*.cpp' \) \
            -print0 | xargs -0 clang-format-18 --dry-run --Werror
      - name: Configure for compile commands
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - name: clang-tidy
        run: |
          find include bench tests \( -name '*.hpp' -o -name '*.cpp' \) \
            -print0 | xargs -0 clang-tidy-18 -p build
